services:
  - type: web
    name: rifa-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rifa-db
          property: connectionString

databases:
  - name: rifa-db
    databaseName: rifa
    user: rifa_user